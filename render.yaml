services:
  # 1. Backend: FastAPI Web Service
  - type: web
    name: e-commerce-recommendation-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    # FastAPI'nin çalıştırılacağı komut (Dizin yoluna dikkat edin)
    startCommand: "gunicorn src.api.fastapi_app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # 2. Frontend: Static Site
  - type: static
    name: e-commerce-recommendation-frontend
    # Yalnızca frontend klasörünün içeriği yayınlanacak
    staticPublishPath: ./frontend
    # Herhangi bir build (derleme) işlemine gerek yok
    buildCommand: "echo 'No build required'"
